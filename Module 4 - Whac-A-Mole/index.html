<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>FaceBomp — Whac-A-Mole</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <main class="game-wrap">
      <header class="game-header">
        <h1 class="title">FaceBomp</h1>
        <div class="controls">
          <button id="startButton" class="start">Start</button>
          <div class="status">
            <span>Score: <strong id="score">0</strong></span>
            <span>Time: <strong id="time">30</strong>s</span>
          </div>
        </div>
      </header>

      <section class="board" id="board">
        <!-- 6 holes with an image inside each. Images use a data-URI placeholder to avoid external assets. -->
        <div class="hole"><img class="mole" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23ffffff'/><circle cx='50' cy='40' r='20' fill='%23ffcc00'/><circle cx='38' cy='36' r='4' fill='%23000'/><circle cx='62' cy='36' r='4' fill='%23000'/><path d='M35 60 Q50 74 65 60' stroke='%23000' stroke-width='4' fill='none' stroke-linecap='round'/></svg>" alt="photo"></div>
        <div class="hole"><img class="mole" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23ffffff'/><circle cx='50' cy='40' r='20' fill='%23ffcc00'/><circle cx='38' cy='36' r='4' fill='%23000'/><circle cx='62' cy='36' r='4' fill='%23000'/><path d='M35 60 Q50 74 65 60' stroke='%23000' stroke-width='4' fill='none' stroke-linecap='round'/></svg>" alt="photo"></div>
        <div class="hole"><img class="mole" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23ffffff'/><circle cx='50' cy='40' r='20' fill='%23ffcc00'/><circle cx='38' cy='36' r='4' fill='%23000'/><circle cx='62' cy='36' r='4' fill='%23000'/><path d='M35 60 Q50 74 65 60' stroke='%23000' stroke-width='4' fill='none' stroke-linecap='round'/></svg>" alt="photo"></div>
        <div class="hole"><img class="mole" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23ffffff'/><circle cx='50' cy='40' r='20' fill='%23ffcc00'/><circle cx='38' cy='36' r='4' fill='%23000'/><circle cx='62' cy='36' r='4' fill='%23000'/><path d='M35 60 Q50 74 65 60' stroke='%23000' stroke-width='4' fill='none' stroke-linecap='round'/></svg>" alt="photo"></div>
        <div class="hole"><img class="mole" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23ffffff'/><circle cx='50' cy='40' r='20' fill='%23ffcc00'/><circle cx='38' cy='36' r='4' fill='%23000'/><circle cx='62' cy='36' r='4' fill='%23000'/><path d='M35 60 Q50 74 65 60' stroke='%23000' stroke-width='4' fill='none' stroke-linecap='round'/></svg>" alt="photo"></div>
        <div class="hole"><img class="mole" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23ffffff'/><circle cx='50' cy='40' r='20' fill='%23ffcc00'/><circle cx='38' cy='36' r='4' fill='%23000'/><circle cx='62' cy='36' r='4' fill='%23000'/><path d='M35 60 Q50 74 65 60' stroke='%23000' stroke-width='4' fill='none' stroke-linecap='round'/></svg>" alt="photo"></div>
      </section>

      <div id="finalMessage" class="final"></div>
    </main>

    <!-- Audio assets (place your files at js/audio/ or update paths) -->
    <audio id="whacSound" src="audio/whac.wav" preload="auto"></audio>
    <audio id="cheerSound" src="audio/cheer.wav" preload="auto"></audio>
    <audio id="endSound" src="audio/game-end.wav" preload="auto"></audio>

    <script src="js/script.js"></script>
  </body>
</html>
