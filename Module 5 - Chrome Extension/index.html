<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping List Saver</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="container">
    <h1>Shopping List</h1>
    <p class="subtitle">Save the current tab link with a category.</p>

    <div class="form-group">
      <label for="category">Category</label>
      <select id="category">
        <option value="">--Select a category--</option>
        <option value="Books">Books</option>
        <option value="Clothes">Clothes</option>
        <option value="Shoes">Shoes</option>
        <option value="Electronics">Electronics</option>
        <option value="Pets">Pets</option>
        <option value="Health">Health</option>
      </select>
    </div>

    <button id="saveButton" class="primary-button">Save Item</button>
    <div id="status" class="status" role="status" aria-live="polite"></div>

    <section class="preview-section">
      <h2>Current Page Preview</h2>
      <div id="previewMessage" class="preview-message">Loading current tab preview…</div>
      <div class="preview-card">
        <p class="preview-label">Title</p>
        <p id="previewTitle" class="preview-title"></p>
        <p class="preview-label">Link</p>
        <p id="previewUrl" class="preview-url"></p>
      </div>
    </section>

    <section class="list-section">
      <h2>Saved Items</h2>
      <div id="emptyMessage" class="empty-message">No items saved yet.</div>
      <div id="categoryLists" class="category-lists"></div>
    </section>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
