<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="index, follow" />
  <title>LearnAI Sign-Up</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='58' font-size='72' text-anchor='middle'%3E%F0%9F%92%BB%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="container" role="main">
    <section class="signup-card" aria-label="Subscription Sign-Up Card">
      <div class="image-wrapper" aria-hidden="true">
        <img src="https://images.unsplash.com/photo-1531746790731-6c087fecd65a?auto=format&fit=crop&w=1000&q=80" alt="Smiling character with laptop surrounded by stars" />
      </div>
      <div class="locale-row">
        <label for="languageSelect">Language</label>
        <select id="languageSelect" aria-label="Choose language"></select>
      </div>
      <header class="header-content">
        <h1>Hey there, AI Learner!</h1>
        <p>Subscribe now for AI prompts, easy practice, and weekly challenges.</p>
      </header>

      <form id="signupForm" novalidate>
        <div class="form-group">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" maxlength="64" placeholder="Enter your name" required aria-describedby="nameError" />
          <small class="error" id="nameError"></small>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" maxlength="64" placeholder="you@example.com" required aria-describedby="emailError" />
          <small class="error" id="emailError"></small>
        </div>

        <button id="submitBtn" type="submit" disabled>Subscribe</button>

        <p id="successMessage" class="success" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>
  <script src="js/script.js"></script>
</body>
</html>
